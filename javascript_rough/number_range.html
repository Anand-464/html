<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = Number(prompt("enter the number"));

        if (num<=10 && num>=0){
            console.log("the number is betwwen 0 & 10");
        }else if (num<=20 && num>=11){
            console.log("the number is between 10 & 20");
        }else if (num<=30 && num>=21){
            console.log("the number is between 20 & 30");
        }else if (num<=40 && num>=31){
            console.log("the number is between 30 & 40");
        }else if (num<=50 && num>=41){
            console.log("the number is between 40 & 50");
        }else{
            console.log("the number is larger than 50");
        }
    </script>
</body>
</html>
