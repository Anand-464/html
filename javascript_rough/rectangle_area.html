<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let l = Number(prompt("Enter the length of the rectangle.. "))
        let b = Number(prompt("Enter the breadth of the rectangle.."))

        var area = l*b
        var peri = 2*(l+b)

        console.log(`the area is ${area}`)
        console.log(`the perimeter is ${peri}`)
    </script>
</body>
