<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>
</head>
<body>
  <form action="" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required placeholder="Your name..." maxlength="25">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required value="test@example.com" autofocus>
    <br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required minlength="6">
    <br><br>

    <label for="category">Category:</label>
    <select id="category" name="category" required>
      <option value="student">Student</option>
      <option value="employee">Employee</option>
      <option value="freelancer" selected>Freelancer</option>
    </select>
    <br><br>

    <label for="date">Event Date:</label>
    <input type="date" id="date" name="date" required>
    <br><br>

    <label>Tickets:</label>
    <input type="radio" id="ticket1" name="tickets" value="1" required>
    <label for="ticket1">1 Ticket</label>
    <input type="radio" id="ticket2" name="tickets" value="2" required checked>
    <label for="ticket2">2 Tickets</label>
    <input type="radio" id="ticket3" name="tickets" value="3" required>
    <label for="ticket3">3 Tickets</label><br><br>

    <input type="checkbox" id="payment" name="payment" required>
    <label for="payment">Online payment</label>
    <br><br>

    <label for="notes">Notes:</label><br>
    <textarea id="notes" name="notes" placeholder="Enter Additional notes">
    </textarea>
    <br><br>

    <input type="submit" value="Submit" required>
  
  </form>
</body>
</html>
