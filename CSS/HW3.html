<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Restaurant menu</title>

    <style>
        body{
            background-color: bisque;
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px;
        }
        h3{
            text-align: right;
            font-family: Georgia, serif;
            font-size: 35px;
            color: darkred;
            margin: 0px 0px 15px 2px;
        }
        a{
            text-decoration: none;
            color: darkred;
        }
        a:hover{
            color: blue;
        }
        .link{
            text-align: right;
            font-size: 17px;
            margin: 0px 44px;
        }
        p{
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 7px;
            word-spacing: 5px;
            font-weight:lighter;
        }
        table{
            width: 60%;
            margin: auto;
            border-collapse: collapse;
        }
        table,th,td{
            border: 2px solid burlywood;
        }
        th,td{
            text-align: center;
            vertical-align: middle;
            padding: 12px;
        }
        
    </style>
</head>
<body>
    <div class="card">
        <h3>
            <i class="fa-solid fa-utensils"></i>
            Imperial restaurant
            <i class="fa-solid fa-bowl-food"></i>
        </h3>

        <div class="link">
            <a href="">Home</a> ||
            <a href="">About Us</a>
        </div><hr color="burlywood">

        <p>
            Welcome to our restaurant Imperial. Taste the flavours of the world and enjoy the world class treatment. Our branches are all around India and Asia and proudly with 3 michelin stars.
        </p>

        <table>
            <tr>
                <th>Items</th>
                <th>Prices</th>
            </tr>
            <tr>
                <td>Biriyani</td>
                <td>&#8377; 350</td>
            </tr>
            <tr>
                <td>Steak</td>
                <td>&#8377; 1120</td>
            </tr>
            <tr>
                <td>Special noodles</td>
                <td>&#8377; 1550</td>
            </tr>
        </table>
        
        
    </div>
</body>
</html>
