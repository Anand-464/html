<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <style>
        .card{
            background-color: gray;
            width: 50%;
            height: 400px;
            
            border: 2px solid red;
            border-radius:15px;

            padding: 15px;
            margin: 20px auto;

            box-sizing: border-box;
            text-align: center;

        }
        .card img{
            max-width: 100%;
            min-width: 200px;
            height: auto;
            width: 250px;
            border-radius: 20px;
        }
        .card h1{
            margin: 10px 0;
        }
        .card p{
            margin: 0px;
            padding: 10px;
        }
        
    </style>
</head>
<body>
    <div class="card">
        <h1>
            Wireless earbuds
        </h1>

        <img src="https://www.intex.in/cdn/shop/files/IntexBudsAeroWhitePDP-02_1024x1024.jpg?v=1773383544">

        <p>
            High quality eadbuds with noise cancellation and bluetooth connectivity with range upto 10 meters and lossless audio quality.
        </p>
    </div>
</body>
</html>
