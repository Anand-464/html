<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attribute Selector</title>

  <style>
    .red{
      color: red;
    }
  </style>
</head>
<body>
  <a href="">Link without target</a>
  <br><br>
  <a href="" class="red" target="_blank">Link with target</a>
</body>
</html>
