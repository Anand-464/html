<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>

    <style>
        body {
            background-color: rgb(84, 87, 88);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: darkblue;
            background-color: lightyellow;
            padding: 15px;
        }

        .bio {
            color: darkgreen;
            background-color: lightgreen;
            padding: 15px;
            margin: 20px;
        }

        .quote {
            color: maroon;
            background-color: pink;
            padding: 15px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Anand</h1>

    <div class="bio">
        <p>
            Hello! My name is Anand. I am learning web development and enjoy creating websites using HTML, CSS, and JavaScript.
        </p>
    </div>

    <div class="quote">
        <p><i>"The strong are always kind"</i></p>
    </div>
</body>
</html>
