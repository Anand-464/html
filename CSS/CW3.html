<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Info</title>

    <style>
        body{
            background-color:floralwhite;
        }
        h3{
            text-align: right;
            color: darkkhaki;
            font-family:fantasy;
            font-size: 40px;

        }
        p{
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 7px;
            word-spacing: 5px;
            font-weight:lighter;
        }
        table{
            width: 50%;
            margin: auto;
            border-collapse: collapse;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        table,th,td{
            border: 2px solid rosybrown;
        }
        th,td{
            text-align: center;
            vertical-align: middle;
            padding: 12px;
        }
    </style>
</head>
<body>
    <h3>ABC Technologies</h3>

    <p>
        Reach out to us and let us know your thoughts.
    </p>
    
    <table>
        <tr>
            <th>Departments</th>
            <th>Phone numbers</th>
        </tr>
        <tr>
            <td>Sales</td>
            <td>+91 1234567890</td>
        </tr>
        <tr>
            <td>Customer Support</td>
            <td>+91 0987654321</td>
        </tr>
    </table>
</body>
</html>
