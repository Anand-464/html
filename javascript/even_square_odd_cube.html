<!--1 to 20 even num=square odd num=cube-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var i;
        for(i=0; i<=20; i++){
            if(i%2==0){
                console.log(`square of even numbers are ${i}=${i*i}`)
            }else{
                console.log(`cube of odd numbers are ${i}=${i*i*i}`)
            }
        }
    </script>
</body>
</html>
