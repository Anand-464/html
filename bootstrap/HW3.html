<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Course Progress Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

</head>
<body>
    <div class="container mt-5">
        
            <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item"><a href="#">Courses</a></li>
                <li class="breadcrumb-item active" aria-current="page">Web development</li>
            </ol>
            </nav>

            <h2 class="mb-4">Web Development Course<span class="badge badge-success">New</span></h2>

            <h6>HTML</h6>
            <div class="progress mb-3">
                <div class="progress-bar progress-bar-striped bg-success" style="width:100%">100%</div>
            </div>

            <h6>CSS</h6>
            <div class="progress mb-3">
                <div class="progress-bar progress-bar-striped bg-primary" style="width:75%">75%</div>
            </div>

            <h6>JavaScript</h6>
            <div class="progress mb-3">
                <div class="progress-bar progress-bar-striped bg-warning" style="width:50%">50%</div>
            </div>

            <h6>Bootstrap</h6>
            <div class="progress mb-3">
                <div class="progress-bar progress-bar-striped bg-danger" style="width:25%">25%</div>
            </div>
            
        <div class="btn-group mb-4">  
            <button type="button" class="btn btn-outline-success">Start</button>
            <button type="button" class="btn btn-outline-warning">Pause</button>
            <button type="button" class="btn btn-outline-danger">Reset</button>
        </div>

        <div class="page">
            <ul class="pagination justify-content-center">
                <li class="page-item"><a class="page-link" href="#">Previous</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">Next</a></li>
            </ul>
        </div>
        
    </div>
</body>
</html>
