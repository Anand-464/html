<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <title>Student profile and grades</title>

    <style>
        h1{
            text-align: center;
            text-transform: uppercase;
        }
        blockquote,table{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 class="display-4">Student Profile</h1>

    <blockquote>“<i>Learning never exhausts the mind.</i>”</blockquote>

    <div class="container">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ9AOD2zIEra270eFjiJASj_m1jRYZyRHsBwE5NiNcTI1R_93L0btpG8ZU&s=10" class="rounded-circle mx-auto d-block" width="250" height="250" alt="profile_img">

        <table class="table table-striped">
            <thead class="thead-dark">
            <tr>
                <th>Subject</th>
                <th>Marks Scored (50)</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Mathematics</td>
                <td>35</td>
            </tr>
            <tr>
                <td>Physics</td>
                <td>41</td>
            </tr>
            <tr>
                <td>Chemistry</td>
                <td>45</td>
            </tr>
            </tbody>
        </table>
    
        <div class="alert alert-success" role="alert">
            Profile updated successfully!
        </div>

    </div>
</body>
</html>
