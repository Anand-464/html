<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <style>
        body{
            background-color: aliceblue;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center py-4">
            <h3 class="display-4 font-weight-bold text-primary">Student dashboard</h3>
            
        </div>

        <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">My courses</li>
        </ol>
        </nav>

        <h4 class="display-5 text-secondary">My Progress<span class="badge badge-success">3 Courses</span></h4>
        

        <button type="button" class="btn btn-outline-primary">Start New Course</button>
                
        <div class="progress mt-5">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width:70%">70%</div>
        </div>

        <div class="page mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item"><a class="page-link" href="#">Previous</a></li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item active"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">Next</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
