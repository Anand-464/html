<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel site</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container mt-5">
            <div id="carouselExampleCaptions" class="carousel slide" data-ride="carousel">
    <ol class="carousel-indicators">
        <li data-target="#carouselExampleCaptions" data-slide-to="0" class="active"></li>
        <li data-target="#carouselExampleCaptions" data-slide-to="1"></li>
        <li data-target="#carouselExampleCaptions" data-slide-to="2"></li>
    </ol>
    <div class="carousel-inner">
        <div class="carousel-item active">
        <img src="https://picsum.photos/id/1018/1200/500"
                     class="d-block w-100"
                     alt="Beach">
        <div class="carousel-caption d-none d-md-block">
            <h3>Trekking</h3>
            <p>Enjoy a wild trekking experience</p>
            <button class="btn btn-warning" data-toggle="modal" data-target="#bookingModal">Book Now</button>
        </div>

        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/id/1015/1200/500" class="d-block w-100" alt="Mountain">
            <div class="carousel-caption">
                <h3>Mountain Adventure</h3>
                <p>Explore breathtaking mountain destinations.</p>
                <button class="btn btn-warning" data-toggle="modal" data-target="#bookingModal">Book Now</button>
            </div>
        </div>

        <div class="carousel-item">
        <img src="https://picsum.photos/id/1043/1200/500" class="d-block w-100" alt="City">
            <div class="carousel-caption d-none d-md-block">
                <h3>Wild camps</h3>
                <p>Discover exciting locations and camp overnight</p>
                <button class="btn btn-warning" data-toggle="modal" data-target="#bookingModal">Book Now</button>
            </div>
        </div>
        </div>
        <button class="carousel-control-prev" type="button" data-target="#carouselExampleCaptions" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-target="#carouselExampleCaptions" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
        </button>
        </div>

        <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">

                    <h4 class="modal-title">Travel Booking</h4>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>

                <div class="modal-body">
                    <p>
                        Book your dream vacation today and enjoy exclusive discounts on hotels, flights, and tour packages.
                    </p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-danger" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    </div>
</body>
</html>
