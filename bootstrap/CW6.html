<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h3>Online Feedback Form</h3>
                    </div>
                    <div class="card-body">
                        <form action="">
                            <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" class="form-control" id="name" placeholder="Enter your name">
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email">
                        </div>

                        <div class="form-group">
                            <label for="feedback">Feedback Message</label>
                            <textarea class="form-control" id="feedback" rows="4" placeholder="Write your feedback here"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="source">How did you find our website?</label>
                            <select class="form-control" id="source">
                                <option selected disabled>Select an option</option>
                                <option>Social Media</option>
                                <option>Friend/Family</option>
                                <option>Advertisement</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Satisfaction Level</label>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="rating" id="rate1" value="1">
                                <label class="form-check-label" for="rate1">1</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="rating" id="rate2" value="2">
                                <label class="form-check-label" for="rate2">2</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="rating" id="rate3" value="3">
                                <label class="form-check-label" for="rate3">3</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="rating" id="rate4" value="4">
                                <label class="form-check-label" for="rate4">4</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="rating" id="rate5" value="5">
                                <label class="form-check-label" for="rate5">5</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success btn-block">
                            Submit Feedback
                        </button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
