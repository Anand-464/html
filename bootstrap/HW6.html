<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-dark text-center">
                        <h3>Feedback Form</h3>
                    </div>

                    <div class="card-body">
                        <form action="">
                            <div class="form-group">
                                <label for="name" class="form-label">Customer Name:</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter Name">
                            </div>

                            <div class="form-group">
                                <label for="email" class="form-label">Email Address:</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter Email">
                            </div>

                            <div class="form-group">
                                <label for="feedback" class="form-label">Feedback:</label>
                                <textarea name="text" class="form-control" id="feedback" placeholder="Write your feedback" rows="4"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="">Preferred Contact Method</label>

                                <div class="form-check">
                                    <input type="radio" class="form-check-input" name="contact" id="emailContact">
                                    <label for="emailContact" class="form-check-label">Email</label>
                                </div>
                                <div class="form-check">
                                    <input type="radio" class="form-check-input" name="contact" id="phoneContact">
                                    <label for="phoneContact" class="form-check-label">Phone</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="satisfaction">Satisfaction Level (1-10)</label>
                                <input type="range" class="custom-range" id="satisfaction" min="1" max="10">
                            </div>

                            <div class="form-group">
                                <label for="orderType">Type of order</label>
                                <select class="form-control" id="orderType">
                                    <option selected disabled>Select Order Type</option>
                                    <option>Cake</option>
                                    <option>Cookies</option>
                                    <option>Pastries</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-success btn-block">Submit Feedback</button>
                    </form>
                </div>
            </div>    
        </div>
    </div>
    </div>
</body>
</html>
