<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const mystryLvl = Math.floor(Math.random()*50)+1;
        const inputScore = "45";
        const diff = Math.abs(mystryLvl - inputScore);
        const sqrt = Math.sqrt(Number(inputScore));
        const pi = Math.PI;
        const string = "20";
        const maxVal = Math.max(10,20,mystryLvl);
        const minVal = Math.min(10,20,mystryLvl);

        console.log(`Random lvl = ${mystryLvl}`);
        console.log(`String to number = ${Number(inputScore)}`);
        console.log(`Absolute difference = ${diff}`);
        console.log(`Sqrt = ${sqrt}`);
        console.log(`Pi = ${pi}`);
        console.log(`String multiplication = ${string * 5}`);
        console.log(`Max value = ${maxVal}`);
        console.log(`Min value = ${minVal}`);

    </script>
</body>
</html>
