<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product table</title>

    <style>
        body{
            background-color:rgb(114, 114, 114);
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

        }
        table{
            color: white;
            background-color: rgb(67, 67, 67);
            width: 50%;
            margin: auto;
            border-collapse: collapse;
        }
        th{
            font-weight: bolder;
            background-color: rgb(47, 47, 47);
        }
        td{
            font-weight: lighter;
            padding: 10px;
        }
        th,td,table{
            border: 2px solid #ddd;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Product details</h1>
    <table>
        <tr>
            <th>Id</th>
            <th>Product Name</th>
            <th>Product price</th>
        </tr>
        <tr>
            <td>#0001</td>
            <td>Charger</td>
            <td>&#8377; 599</td>
        </tr>   
        <tr>
            <td>#0002</td>
            <td>Cable</td>
            <td>&#8377; 299</td>
        </tr>
            <td>#0003</td>
            <td>Screen protector</td>
            <td>&#8377; 199</td>
        <tr>
            <td>#0004</td>
            <td>Cover</td>
            <td>&#8377; 399</td>
        </tr>
        <tr>
            <td>#0005</td>
            <td>Adapter</td>
            <td>&#8377; 1199</td>
        </tr>
    </table>
</body>
</html>
