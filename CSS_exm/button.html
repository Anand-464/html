<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>

    <style>
        *{
            
            margin: auto;
            width: 100px;
        }
        a{
            font-family:fantasy;
            color: white;
            text-decoration: none;
        }
        .btn{
            text-align: center;
            width: 70px;
            margin: auto;
            background-color: rgb(26, 26, 26);
            border: 1px solid black;
            border-radius: 70px;
            color: white;
            display: inline-block;
            padding: 10px;
        }
        .btn:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="btn">
        <a href="">click here</a>
    </div>
</body>
</html>
