<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="bg-primary">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-8">
                <div class="card  bg-white ">
                    <div class="card-body px-5">
                        <h3 class="font-weight-bold">Sign Up</h3>
                        <p class="text-secondary">Please fill in this form to create an account</p>
                    
                    
                    <form>
                    <div class="form-row ">
                        <div class="form-group col-md-6 ">
                        <input type="text" class="form-control bg-light" id="firstName" placeholder="First Name">
                        </div>
                        <div class="form-group col-md-6">
                        <input type="text" class="form-control bg-light" id="lastName" placeholder="Last Name">
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-control bg-light" id="email" placeholder="Email">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control bg-light" id="password" placeholder="Password">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control bg-light" id="confirmPassword" placeholder="Confirm Password">
                    </div>
                    
                    <div class="form-group">
                        <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck">
                        <label class="form-check-label text-secondary" for="gridCheck">
                            I accept the <a href="#">Terms of use</a> & <a href="#">Privacy Policy</a>
                        </label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary font-weight-bold">Sign Up</button>
                    </form>
                    </div>
                    
                </div>
                <p class="text-center text-white mt-2">
                        Already have an account? <a href="#" class="text-white"><u>Login here</u></a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
